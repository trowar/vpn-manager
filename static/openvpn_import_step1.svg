<svg xmlns="http://www.w3.org/2000/svg" width="920" height="620" viewBox="0 0 920 620">
  <rect width="920" height="620" fill="#eef2f7"/>
  <rect x="26" y="26" width="868" height="568" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="52" y="66" font-family="Segoe UI, Arial, sans-serif" font-size="36" fill="#1e293b">OpenVPN Connect</text>

  <rect x="70" y="116" width="780" height="382" rx="28" fill="#f8fafc" stroke="#dbe4ee" stroke-width="2"/>
  <text x="130" y="176" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#334155">
    Connect with Server URL or Cloud ID
  </text>

  <rect x="120" y="228" width="680" height="90" rx="10" fill="#ffffff" stroke="#c6d0e1" stroke-width="2"/>
  <text x="150" y="285" font-family="Segoe UI, Arial, sans-serif" font-size="32" fill="#64748b">Enter your URL or Cloud ID</text>

  <rect x="120" y="355" width="680" height="95" rx="12" fill="#1d4ed8"/>
  <text x="352" y="413" font-family="Segoe UI, Arial, sans-serif" font-size="38" fill="#ffffff">Continue</text>

  <text x="305" y="540" font-family="Segoe UI, Arial, sans-serif" font-size="38" fill="#475569">
    Have a configuration file instead (.ovpn)?
  </text>
  <rect x="340" y="554" width="240" height="44" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="393" y="585" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#334155">Upload File</text>

  <line x1="740" y1="470" x2="590" y2="565" stroke="#ef4444" stroke-width="8"/>
  <polygon points="590,565 628,560 608,595" fill="#ef4444"/>
</svg>
