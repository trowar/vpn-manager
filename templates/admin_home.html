{% extends "base.html" %}
{% block content %}
<section class="card">
  <h2>管理员仪表盘</h2>
  <p class="helper">运营总览：待处理订单、在线用户、异常节点、即将到期权益（7天内）与用户总数。</p>
</section>

<section class="card">
  <h3>运营概览</h3>
  <div class="overview-grid overview-grid-5">
    <a class="overview-link" href="{{ url_for('admin_pending_orders') }}">
      <span class="overview-label">待处理订单</span>
      <strong class="overview-value">{{ pending_count }}</strong>
    </a>
    <a class="overview-link" href="{{ url_for('admin_online_users') }}">
      <span class="overview-label">在线用户</span>
      <strong class="overview-value">{{ online_user_count }}</strong>
    </a>
    <a class="overview-link" href="{{ url_for('admin_servers') }}">
      <span class="overview-label">异常节点</span>
      <strong class="overview-value">{{ abnormal_server_count }}</strong>
    </a>
    <a class="overview-link" href="{{ url_for('admin_subscriptions') }}#expiring-rights">
      <span class="overview-label">即将到期权益</span>
      <strong class="overview-value">{{ expiring_count }}</strong>
    </a>
    <a class="overview-link" href="{{ url_for('admin_subscriptions') }}">
      <span class="overview-label">用户总览</span>
      <strong class="overview-value">{{ total_users }}</strong>
    </a>
  </div>
</section>
{% endblock %}
