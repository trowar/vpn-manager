{% extends "base.html" %}
{% block content %}
<div class="dashboard-main">
  <section class="card">
    <h3>使用说明：如何配置 VPN</h3>
    <ol class="guide-steps">
      <li>先在“下载配置与切换节点”里选择默认服务器。</li>
      <li>下载 Shadowsocks 配置文件并导入客户端。</li>
      <li>连接成功后访问 `https://ip.sb` 核对出口 IP。</li>
    </ol>

    <div class="feature-grid guide-grid">
      <div class="feature-item">
        <h4>Shadowsocks / KCPTUN</h4>
        <p>当前默认方案，推荐用于日常连接与加速。</p>
        <div class="actions">
          <a class="btn" href="{{ url_for('dashboard_config') }}">前往配置页面</a>
        </div>
      </div>
    </div>
  </section>
</div>
{% endblock %}
