{% extends "base.html" %}
{% block content %}
<section class="card narrow">
  <h2>找回密码</h2>
  <p class="helper">请先发送邮箱验证码，再完成密码重置。</p>
  <form method="post" class="form">
    <label>邮箱
      <input type="email" name="email" value="{{ email_prefill }}" required>
    </label>
    <label>图片验证码</label>
    <div class="captcha-row">
      <input type="text" name="captcha" maxlength="6" required placeholder="输入右侧验证码">
      <img
        id="captcha-recover"
        class="captcha-img"
        src="{{ url_for('captcha_svg', scene='recover') }}"
        alt="验证码"
        title="点击刷新验证码"
      >
    </div>
    <label>邮箱验证码
      <input type="text" name="email_code" maxlength="6" required placeholder="请输入 6 位数字验证码">
    </label>
    <label>新密码
      <input type="password" name="new_password" minlength="8" required>
    </label>
    <label>确认新密码
      <input type="password" name="confirm_password" minlength="8" required>
    </label>
    <div class="actions">
      <button
        type="submit"
        formaction="{{ url_for('password_recover_send_code') }}"
        formmethod="post"
        class="secondary"
      >
        发送邮箱验证码
      </button>
      <button type="submit">重置密码</button>
    </div>
  </form>
  <p class="helper">想起密码了？<a href="{{ url_for('login') }}">返回登录</a></p>
</section>
<script>
  (function () {
    var captcha = document.getElementById("captcha-recover");
    if (!captcha) return;
    captcha.addEventListener("click", function () {
      captcha.src = "{{ url_for('captcha_svg', scene='recover') }}?t=" + Date.now();
    });
  })();
</script>
{% endblock %}
