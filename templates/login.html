{% extends "base.html" %}
{% block content %}
<section class="card narrow">
  <h2>登录</h2>
  <p class="helper">管理员默认账号：<code>admin</code>，默认密码：<code>admin</code>（首次登录需修改密码）。</p>
  <form method="post" class="form">
    <label>邮箱（管理员可使用 admin 用户名）
      <input type="text" name="identity" required>
    </label>
    <label>密码
      <input type="password" name="password" required>
    </label>
    <button type="submit">登录</button>
  </form>
  <p class="helper">还没有账号？<a href="{{ url_for('register') }}">立即注册</a></p>
</section>
{% endblock %}
