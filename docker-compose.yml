services:
  postgres:
    image: postgres:16-alpine
    container_name: vpn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PORTAL_POSTGRES_DB:-vpnportal}
      POSTGRES_USER: ${PORTAL_POSTGRES_USER:-vpnportal}
      POSTGRES_PASSWORD: ${PORTAL_POSTGRES_PASSWORD:-vpnportal}
      TZ: ${TZ:-UTC}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PORTAL_POSTGRES_USER:-vpnportal} -d ${PORTAL_POSTGRES_DB:-vpnportal}"]
      interval: 10s
      timeout: 5s
      retries: 8
    networks:
      - vpnnet

  vpnmanager-server:
    profiles:
      - vpn-server
    build:
      context: .
      dockerfile: docker/vpn/Dockerfile
    container_name: vpnmanager-server
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv6.conf.all.forwarding: "1"
    environment:
      WG_INTERFACE: ${WG_INTERFACE:-wg0}
      WG_SERVER_PUBLIC_KEY_FILE: /srv/vpn-shared/server_public.key
      VPN_API_TOKEN: ${VPN_API_TOKEN}
      VPN_API_PORT: 8081
      VPN_ENABLE_WIREGUARD: ${VPN_ENABLE_WIREGUARD:-1}
      VPN_ENABLE_OPENVPN: ${VPN_ENABLE_OPENVPN:-1}
      VPN_ENABLE_DNSMASQ: ${VPN_ENABLE_DNSMASQ:-1}
      OPENVPN_SERVER_CONF: /etc/openvpn/server/server.conf
      DNSMASQ_CONF: /etc/dnsmasq.d/vpn.conf
      PORTAL_DB_PATH: /app/data/portal.db
    volumes:
      - ./docker/vpn/wireguard:/etc/wireguard
      - ./docker/vpn/openvpn:/etc/openvpn/server
      - ./docker/vpn/dnsmasq.conf:/etc/dnsmasq.d/vpn.conf:ro
      - portal_data:/app/data
      - vpn_shared:/srv/vpn-shared
    ports:
      - "${WG_PUBLIC_PORT:-51820}:51820/udp"
      - "${OPENVPN_PUBLIC_PORT:-1194}:1194/udp"
      - "${DNS_PUBLIC_PORT:-53}:53/udp"
      - "${DNS_PUBLIC_PORT:-53}:53/tcp"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/healthz', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 8s
    networks:
      - vpnnet

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    container_name: vpn-web
    restart: unless-stopped
    environment:
      PORTAL_DB_BACKEND: ${PORTAL_DB_BACKEND:-postgres}
      PORTAL_POSTGRES_DSN: ${PORTAL_POSTGRES_DSN:-postgresql://vpnportal:vpnportal@postgres:5432/vpnportal}
      PORTAL_SQLITE_MIGRATION_SOURCE: ${PORTAL_SQLITE_MIGRATION_SOURCE:-/app/data/portal.db}
      PORTAL_SECRET_KEY: ${PORTAL_SECRET_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      PORTAL_ENABLE_UDP_RELAY: ${PORTAL_ENABLE_UDP_RELAY:-1}
      VPN_RELAY_PUBLIC_HOST: ${VPN_RELAY_PUBLIC_HOST:-}
      WG_RELAY_PORT_START: ${WG_RELAY_PORT_START:-24000}
      WG_RELAY_PORT_END: ${WG_RELAY_PORT_END:-28999}
      OPENVPN_RELAY_PORT_START: ${OPENVPN_RELAY_PORT_START:-29000}
      OPENVPN_RELAY_PORT_END: ${OPENVPN_RELAY_PORT_END:-33999}
      PORTAL_SELF_UPGRADE_HOST_PROJECT_DIR: ${PORTAL_SELF_UPGRADE_HOST_PROJECT_DIR:-/opt/vpn-platform-v1}
      PORTAL_SELF_UPGRADE_PROJECT_BRANCH: ${PORTAL_SELF_UPGRADE_PROJECT_BRANCH:-main}
      PORTAL_SELF_UPGRADE_HELPER_IMAGE: ${PORTAL_SELF_UPGRADE_HELPER_IMAGE:-docker:27-cli}
      PORTAL_SELF_UPGRADE_DATA_VOLUME: ${PORTAL_SELF_UPGRADE_DATA_VOLUME:-vpn-platform-v1_portal_data}

      PORTAL_DATA_DIR: /app/data
      PORTAL_DB_PATH: /app/data/portal.db

      WG_INTERFACE: ${WG_INTERFACE:-wg0}
      WG_NETWORK: ${WG_NETWORK:-10.7.0.0/24}
      WG_SERVER_ADDRESS: ${WG_SERVER_ADDRESS:-10.7.0.1}
      WG_ENDPOINT: ${WG_ENDPOINT}
      WG_CLIENT_DNS: ${WG_CLIENT_DNS:-10.7.0.1}
      WG_IP_ASSIGNMENT_MODE: ${WG_IP_ASSIGNMENT_MODE:-dynamic}
      WG_ROUTE_POLICY: full
      WG_SERVER_PUBLIC_KEY_FILE: /srv/vpn-shared/server_public.key

      OPENVPN_ENABLED: ${OPENVPN_ENABLED:-1}
      OPENVPN_ENDPOINT_HOST: ${OPENVPN_ENDPOINT_HOST}
      OPENVPN_ENDPOINT_PORT: ${OPENVPN_ENDPOINT_PORT:-1194}
      OPENVPN_PROTO: ${OPENVPN_PROTO:-udp}
      OPENVPN_CLIENT_DNS: ${OPENVPN_CLIENT_DNS:-10.8.0.1}
      OPENVPN_CA_CERT_FILE: /srv/openvpn/ca.crt
      OPENVPN_TLS_CRYPT_KEY_FILE: /srv/openvpn/tls-crypt.key

      VPN_API_URL: ${VPN_API_URL:-}
      VPN_API_TOKEN: ${VPN_API_TOKEN:-}
      VPN_API_TIMEOUT_SECONDS: 8
    volumes:
      - portal_data:/app/data
      - vpn_shared:/srv/vpn-shared:ro
      - ./docker/vpn/openvpn:/srv/openvpn:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${WEB_PUBLIC_PORT:-8080}:8080"
      - "${WG_RELAY_PORT_START:-24000}-${WG_RELAY_PORT_END:-28999}:${WG_RELAY_PORT_START:-24000}-${WG_RELAY_PORT_END:-28999}/udp"
      - "${OPENVPN_RELAY_PORT_START:-29000}-${OPENVPN_RELAY_PORT_END:-33999}:${OPENVPN_RELAY_PORT_START:-29000}-${OPENVPN_RELAY_PORT_END:-33999}/udp"
    networks:
      - vpnnet

volumes:
  portal_data:
  vpn_shared:

networks:
  vpnnet:
    driver: bridge
