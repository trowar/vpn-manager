services:
  vpn:
    build:
      context: .
      dockerfile: docker/vpn/Dockerfile
    container_name: vpn-core
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv6.conf.all.forwarding: "1"
    environment:
      WG_INTERFACE: ${WG_INTERFACE:-wg0}
      WG_SERVER_PUBLIC_KEY_FILE: /srv/vpn-shared/server_public.key
      VPN_API_TOKEN: ${VPN_API_TOKEN}
      VPN_API_PORT: 8081
      VPN_ENABLE_WIREGUARD: ${VPN_ENABLE_WIREGUARD:-1}
      VPN_ENABLE_OPENVPN: ${VPN_ENABLE_OPENVPN:-1}
      VPN_ENABLE_DNSMASQ: ${VPN_ENABLE_DNSMASQ:-1}
      OPENVPN_SERVER_CONF: /etc/openvpn/server/server.conf
      DNSMASQ_CONF: /etc/dnsmasq.d/vpn.conf
      PORTAL_DB_PATH: /app/data/portal.db
    volumes:
      - ./docker/vpn/wireguard:/etc/wireguard
      - ./docker/vpn/openvpn:/etc/openvpn/server
      - ./docker/vpn/dnsmasq.conf:/etc/dnsmasq.d/vpn.conf:ro
      - portal_data:/app/data
      - vpn_shared:/srv/vpn-shared
    ports:
      - "${WG_PUBLIC_PORT:-51820}:51820/udp"
      - "${OPENVPN_PUBLIC_PORT:-1194}:1194/udp"
      - "${DNS_PUBLIC_PORT:-53}:53/udp"
      - "${DNS_PUBLIC_PORT:-53}:53/tcp"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/healthz', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 8s
    networks:
      - vpnnet

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    container_name: vpn-web
    restart: unless-stopped
    depends_on:
      vpn:
        condition: service_healthy
    environment:
      PORTAL_SECRET_KEY: ${PORTAL_SECRET_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}

      PORTAL_DATA_DIR: /app/data
      PORTAL_DB_PATH: /app/data/portal.db

      WG_INTERFACE: ${WG_INTERFACE:-wg0}
      WG_NETWORK: ${WG_NETWORK:-10.7.0.0/24}
      WG_SERVER_ADDRESS: ${WG_SERVER_ADDRESS:-10.7.0.1}
      WG_ENDPOINT: ${WG_ENDPOINT}
      WG_CLIENT_DNS: ${WG_CLIENT_DNS:-10.7.0.1}
      WG_IP_ASSIGNMENT_MODE: ${WG_IP_ASSIGNMENT_MODE:-dynamic}
      WG_ROUTE_POLICY: full
      WG_SERVER_PUBLIC_KEY_FILE: /srv/vpn-shared/server_public.key

      OPENVPN_ENABLED: ${OPENVPN_ENABLED:-1}
      OPENVPN_ENDPOINT_HOST: ${OPENVPN_ENDPOINT_HOST}
      OPENVPN_ENDPOINT_PORT: ${OPENVPN_ENDPOINT_PORT:-1194}
      OPENVPN_PROTO: ${OPENVPN_PROTO:-udp}
      OPENVPN_CLIENT_DNS: ${OPENVPN_CLIENT_DNS:-10.8.0.1}
      OPENVPN_CA_CERT_FILE: /srv/openvpn/ca.crt
      OPENVPN_TLS_CRYPT_KEY_FILE: /srv/openvpn/tls-crypt.key

      VPN_API_URL: http://vpn:8081
      VPN_API_TOKEN: ${VPN_API_TOKEN}
      VPN_API_TIMEOUT_SECONDS: 8
    volumes:
      - portal_data:/app/data
      - vpn_shared:/srv/vpn-shared:ro
      - ./docker/vpn/openvpn:/srv/openvpn:ro
    ports:
      - "${WEB_PUBLIC_PORT:-8080}:8080"
    networks:
      - vpnnet

volumes:
  portal_data:
  vpn_shared:

networks:
  vpnnet:
    driver: bridge
