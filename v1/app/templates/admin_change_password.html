{% extends "base.html" %}
{% block content %}
<section class="card">
  <h1>首次修改管理员密码</h1>
  <p>根据 PRD 要求：默认管理员首次登录必须改密，否则不能访问其他后台页面。</p>
  <form method="post">
    <label>新密码</label>
    <input type="password" name="new_password" required>
    <label>确认密码</label>
    <input type="password" name="confirm_password" required>
    <button type="submit">保存密码</button>
  </form>
</section>
{% endblock %}
