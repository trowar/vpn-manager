{% extends "base.html" %}
{% block content %}
<section class="card">
  <h1 style="margin-top:0;">找回密码</h1>
  <p class="muted">找回密码需要图片验证码与邮箱验证码，重置成功后会使该账号旧会话失效。</p>
  <form method="post">
    <label>邮箱</label>
    <input type="email" name="email" required placeholder="请输入已注册邮箱">

    <label>图片验证码</label>
    <div class="captcha-row">
      <input name="captcha" required maxlength="6" placeholder="请输入右侧验证码">
      <img id="captcha-recover" class="captcha-box" src="{{ url_for('main.captcha_svg', scene='recover') }}" alt="验证码" title="点击刷新验证码">
    </div>

    <label>邮箱验证码</label>
    <input name="email_code" required maxlength="6" placeholder="请输入邮箱验证码">

    <label>新密码</label>
    <input type="password" name="new_password" required minlength="8">

    <label>确认新密码</label>
    <input type="password" name="confirm_password" required minlength="8">

    <div class="actions">
      <button type="submit" formaction="{{ url_for('main.password_recover_send_code') }}" formmethod="post" class="btn-secondary">发送邮箱验证码</button>
      <button type="submit">重置密码</button>
      <a href="{{ url_for('main.login') }}"><button type="button" class="btn-secondary">返回登录</button></a>
    </div>
  </form>
</section>
<script>
  (function () {
    var el = document.getElementById('captcha-recover');
    if (!el) return;
    var reload = function () {
      el.src = "{{ url_for('main.captcha_svg', scene='recover') }}" + "&t=" + Date.now();
    };
    el.addEventListener('click', reload);
  })();
</script>
{% endblock %}
