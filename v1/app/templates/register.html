{% extends "base.html" %}
{% block content %}
<section class="card">
  <h1 style="margin-top:0;">注册账号</h1>
  <p class="muted">邮箱作为唯一账号。验证码 10 分钟有效；同一邮箱 60 秒限发、每天最多 10 次。</p>
  <form method="post">
    <label>邮箱</label>
    <input type="email" name="email" required placeholder="请输入邮箱">

    <label>登录密码</label>
    <input type="password" name="password" required minlength="8" placeholder="至少 8 位">

    <label>确认密码</label>
    <input type="password" name="confirm_password" required minlength="8">

    <label>图片验证码</label>
    <div class="captcha-row">
      <input name="captcha" required maxlength="6" placeholder="请输入右侧验证码">
      <img id="captcha-register" class="captcha-box" src="{{ url_for('main.captcha_svg', scene='register') }}" alt="验证码" title="点击刷新验证码">
    </div>

    <label>邮箱验证码</label>
    <input name="email_code" required maxlength="6" placeholder="6 位数字验证码">

    <div class="actions">
      <button type="submit" formaction="{{ url_for('main.register_send_code') }}" formmethod="post" class="btn-secondary">发送邮箱验证码</button>
      <button type="submit">完成注册</button>
      <a href="{{ url_for('main.login') }}"><button type="button" class="btn-secondary">返回登录</button></a>
    </div>
  </form>
</section>
<script>
  (function () {
    var el = document.getElementById('captcha-register');
    if (!el) return;
    var reload = function () {
      el.src = "{{ url_for('main.captcha_svg', scene='register') }}" + "&t=" + Date.now();
    };
    el.addEventListener('click', reload);
  })();
</script>
{% endblock %}
